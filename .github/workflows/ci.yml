name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck — Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell files
        run: |
          echo "=== Scanning .sh files ==="
          find . -name "*.sh" -not -path "./.git/*" \
            -exec shellcheck --severity=error {} +

          echo "=== Scanning .zsh files ==="
          find . -name "*.zsh" -not -path "./.git/*" \
            -exec shellcheck --shell=bash --severity=error {} +

  validate-plugins:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check plugin contract
        run: |
          ERRORS=0
          for plugin_dir in plugins/*/; do
            plugin=$(basename "$plugin_dir")
            [ "$plugin" = "example" ] && continue

            if [ ! -f "$plugin_dir/init.zsh" ]; then
              echo "FAIL: $plugin — missing init.zsh"
              ERRORS=$((ERRORS + 1))
            fi

            if [ ! -f "$plugin_dir/plugin.zl" ]; then
              echo "WARN: $plugin — missing plugin.zl metadata"
            fi

            if [ ! -f "$plugin_dir/commands.zsh" ]; then
              echo "INFO: $plugin — no commands.zsh (optional)"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "Plugin validation failed: $ERRORS error(s)"
            exit 1
          fi

          echo "All plugins valid ✓"

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check VERSION file exists and is valid semver
        run: |
          if [ ! -f VERSION ]; then
            echo "FAIL: VERSION file missing"
            exit 1
          fi

          VERSION=$(cat VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "FAIL: VERSION '$VERSION' is not valid semver"
            exit 1
          fi

          echo "VERSION: $VERSION ✓"
